name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install dependencies
        run: flutter pub get

      # Step 1: Auto-format code (optional)
      - name: Auto-format code
        run: dart format .

      # Step 2: Check formatting and fail if unformatted
      - name: Check code formatting
        run: |
          if ! dart format --set-exit-if-changed . ; then
            echo "❌ Code is not formatted properly. Please run 'dart format .' locally."
            exit 1
          fi

      - name: Flutter Analyze
        run: flutter analyze

      - name: Build APK
        run: flutter build apk